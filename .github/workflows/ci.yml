name: ci

on:
  push:
    branches: [master, 'feat/**']
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref so a fast push does not queue behind a stale build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # The Haskell build and the full test suite. This is the gate that matters: the
  # correctness suite (soundness, completeness on small instances, differential testing
  # against brute force) runs here on every push.
  build-test:
    name: build + test (ghc 9.12.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.12.2'
          cabal-version: '3.16.1.0'

      # cabal resolves against the index-state pinned in cabal.project, so the plan is
      # reproducible. The cache key includes that file and the .cabal file; change either
      # and the cache is rebuilt rather than silently reused.
      - name: Configure
        run: cabal configure --enable-tests --test-show-details=direct

      - name: Cache cabal store
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            dist-newstyle
          key: ${{ runner.os }}-ghc9.12.2-${{ hashFiles('cabal.project', 'cabal.project.freeze', '**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc9.12.2-

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all

  # Formatting and linting. Pinned tools installed from the same index-state, so the
  # versions are deterministic and no guessed action tags are involved. Run order matters
  # only for the error you see first; both must pass.
  format-lint:
    name: fourmolu + hlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up GHC and cabal
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.12.2'
          cabal-version: '3.16.1.0'

      - name: Cache tool store
        uses: actions/cache@v5
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ runner.os }}-haskell-tools-fourmolu-hlint

      - name: Install fourmolu and hlint
        run: |
          cabal update
          cabal install fourmolu --overwrite-policy=always
          cabal install hlint --overwrite-policy=always

      - name: Check formatting
        run: |
          fourmolu --mode check $(git ls-files '*.hs')

      - name: Lint
        run: hlint .

  # The front end is a milestone-3 component. This job activates the moment a lockfile
  # exists under web/ and stays green (skipped steps) before then, so CI is meaningful
  # from milestone 1 without failing on a directory that has no app in it yet.
  web:
    name: web build (node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for web lockfile
        id: gate
        run: |
          if [ -f web/package-lock.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "web/package-lock.json not found; skipping web build (expected before milestone 3)."
          fi

      - name: Set up Node
        if: steps.gate.outputs.present == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        if: steps.gate.outputs.present == 'true'
        working-directory: web
        run: npm ci

      - name: Lint
        if: steps.gate.outputs.present == 'true'
        working-directory: web
        run: npm run lint

      - name: Build
        if: steps.gate.outputs.present == 'true'
        working-directory: web
        run: npm run build
